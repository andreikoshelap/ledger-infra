server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets can be cached aggressively.
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API -> ledger-api on the compose network. Single origin => no CORS.
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # /actuator is deliberately NOT proxied — health/metrics stay off the public door.

    # SPA fallback: every non-file route resolves to index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}

name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ledger-api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          add-job-summary: never

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --rerun-tasks --no-daemon

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ledger-web

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ledger-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    env:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate compose config
        run: docker compose config

      - name: Start stack
        run: docker compose up --build -d

      - name: Wait for web
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8081/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Smoke API through web proxy
        run: |
          for i in {1..30}; do
            if curl -fsS -H 'X-User-Id: 1' http://localhost:8081/api/accounts; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Stop stack
        if: always()
        run: docker compose down -v
